name: Machin Portal Scraper

permissions:
  contents: write

on:
  # ── Scheduled: twice daily (6 AM IST + 6 PM IST) ──────────────────────────
  schedule:
    - cron: "30 0 * * *"   # 6:00 AM IST  (00:30 UTC)
    - cron: "30 12 * * *"  # 6:00 PM IST  (12:30 UTC)

  # ── On-demand: triggered from Cloudflare Worker or manually ───────────────
  repository_dispatch:
    types: [scrape_student]   # payload: { admission_no, password }

  # ── Manual run from GitHub UI ─────────────────────────────────────────────
  workflow_dispatch:
    inputs:
      admission_no:
        description: "Single student admission number (empty = all students)"
        required: false
        default: ""

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 90        # Max 90 min — covers ~400 students

    steps:
      # 1. Checkout code
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Python 3.10 with pip cache
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: machin_backend/requirements.txt

      # 3. Install dependencies
      - name: Install dependencies
        run: pip install -r machin_backend/requirements.txt

      # 4. Run the scraper
      - name: Run batch scraper
        env:
          GEMINI_API_KEY:                ${{ secrets.GEMINI_API_KEY }}
          FIREBASE_DATABASE_URL:         ${{ secrets.FIREBASE_DATABASE_URL }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          # On-demand: set by repository_dispatch payload or workflow_dispatch input
          SINGLE_ADM: >-
            ${{
              github.event.client_payload.admission_no ||
              github.event.inputs.admission_no ||
              ''
            }}
          SINGLE_PWD: >-
            ${{
              github.event.client_payload.password ||
              ''
            }}
        run: python batch_scrape.py 2>&1 | tee scrape.log

      # 5. Push logs back on failure to debug database issues
      - name: Push logs on failure
        if: failure()
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add scrape.log
          git commit -m "chore: upload scrape log from failed run [skip ci]" || true
          git push origin HEAD:${{ github.ref }} || true
